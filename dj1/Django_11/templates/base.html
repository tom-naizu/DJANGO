<!DOCTYPE html>
<html lang="en">

<head>
    <title>{% block title %} Base HTML {% endblock %}</title>
    {% comment %}<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> {% endcomment %}

    {% load django_bootstrap5 %}
    {% bootstrap_css %}
    {% bootstrap_javascript %}

    {% load static %}
    {% comment %}<link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">{% endcomment %}
    {% block css %}
    <link rel="stylesheet" href="{% static 'style.css' %}">
    {% endblock %}

</head>

<body>
    <div class="container">
        <button type="button" class="btn btn-primary">Primary</button>
        <button type="button" class="btn btn-secondary">Secondary</button>
        <button type="button" class="btn btn-success">Success</button>
        <button type="button" class="btn btn-danger">Danger</button>
        <button type="button" class="btn btn-warning">Warning</button>
        <button type="button" class="btn btn-info">Info</button>
        <button type="button" class="btn btn-light">Light</button>
        <button type="button" class="btn btn-dark">Dark</button>

        <button type="button" class="btn btn-link">Link</button>
        {% block content %}
        <h1>My Site</h1>
        {% endblock %}

        {% comment %}<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>{% endcomment %}

        {% comment %}<script src="{% static 'bootstrap.bundle.min.js' %}"></script>{% endcomment %}
    </div>
</body>

</html>
